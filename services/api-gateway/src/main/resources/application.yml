server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # --- Ingestion Service (readings data) ---
        - id: ingestion-readings
          uri: lb://ingestion-service
          predicates:
            - Path=/api/readings/**

        # --- Meter Registry Service ---
        - id: meter-registry
          uri: lb://meter-registry-service
          predicates:
            - Path=/api/meters/**,/api/zones/**

        # --- Alert Service ---
        - id: alerts
          uri: lb://alert-service
          predicates:
            - Path=/api/alerts/**,/api/alert-rules/**

        # --- Billing Service ---
        - id: billing
          uri: lb://billing-service
          predicates:
            - Path=/api/billing/**,/api/goals/**

        # --- Python: Anomaly Detection ---
        - id: anomaly-detection
          uri: http://anomaly-detection:8090
          predicates:
            - Path=/api/anomalies/**

        # --- Python: Forecasting ---
        - id: forecasting
          uri: http://forecasting:8091
          predicates:
            - Path=/api/forecast/**

        # --- Python: Weather Service ---
        - id: weather
          uri: http://weather-service:8092
          predicates:
            - Path=/api/weather/**

        # --- Python: Chatbot Service ---
        - id: chatbot
          uri: http://chatbot-service:8093
          predicates:
            - Path=/api/chat/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost"
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "https://miyahi.duckdns.org"
              - "http://miyahi.duckdns.org"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
        - Authentication

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO

# JWT Authentication
jwt:
  secret: ${JWT_SECRET:YOUR_SUPER_SECRET_KEY_WHICH_MUST_BE_AT_LEAST_32_BYTES_LONG_FOR_HMAC_SHA_256}
