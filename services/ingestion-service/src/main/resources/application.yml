server:
  port: 8081

spring:
  application:
    name: ingestion-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/miyahi_ts}
    username: ${SPRING_DATASOURCE_USERNAME:miyahi}
    password: ${SPRING_DATASOURCE_PASSWORD:miyahi_ts_dev_2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

# MQTT Configuration
mqtt:
  broker:
    url: ${MQTT_BROKER_URL:tcp://localhost:1883}
    client-id: miyahi-ingestor
    username: ${MQTT_USERNAME:miyahi_backend}
    password: ${MQTT_PASSWORD:backend_secret_2026}
  topic: meters/+/data
  qos: 1

# Eureka registration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    ma.miyahi.ingestion: INFO
    org.springframework.integration.mqtt: INFO
    org.hibernate.SQL: WARN
