# Mosquitto MQTT Broker Configuration — MIYAHI IoT Platform
# Phase 6: Secure authentication enabled

listener 1883
protocol mqtt

# ── Authentication ──
allow_anonymous false
password_file /mosquitto/config/pwfile

# ── Persistence ──
persistence true
persistence_location /mosquitto/data/

# ── Logging ──
log_dest stdout
log_type all
connection_messages true
log_timestamp true

# ── Message size limit (1MB — more than enough for sensor JSON) ──
message_size_limit 1048576

# ── Max inflight messages per client ──
max_inflight_messages 20

# ── Keep alive interval ──
max_keepalive 60

# ── Queue settings for offline clients ──
max_queued_messages 1000
max_queued_bytes 0
