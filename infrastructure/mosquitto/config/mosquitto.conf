# Mosquitto MQTT Broker Configuration — MIYAHI IoT Platform
# MVP: Anonymous access enabled for local development
# Production: Set allow_anonymous to false and configure password_file

listener 1883
protocol mqtt

# Allow anonymous connections (MVP only)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
connection_messages true
log_timestamp true

# Message size limit (1MB — more than enough for sensor JSON)
message_size_limit 1048576

# Max inflight messages per client
max_inflight_messages 20

# Keep alive interval
max_keepalive 60
