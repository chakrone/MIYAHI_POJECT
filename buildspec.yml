# ============================================================
# MIYAHI — AWS CodeBuild Build & Test Spec
# ============================================================
version: 0.2

env:
  parameter-store:
    EC2_HOST: /miyahi/EC2_HOST

phases:
  install:
    runtime-versions:
      java: corretto17
      python: "3.11"
      nodejs: "20"
    commands:
      - echo "Installing dependencies..."

  pre_build:
    commands:
      - echo "Build started on $(date)"
      - echo "Commit SHA = $CODEBUILD_RESOLVED_SOURCE_VERSION"

  build:
    commands:
      # ── Java Services ──────────────────────
      - echo "========================================="
      - echo "Building Java services..."
      - echo "========================================="
      - |
        #!/bin/bash
        JAVA_SERVICES=(
          "api-gateway"
          "eureka-server"
          "config-server"
          "ingestion-service"
          "meter-registry-service"
          "alert-service"
          "billing-service"
        )
        for svc in "${JAVA_SERVICES[@]}"; do
          echo "Building $svc..."
          cd $CODEBUILD_SRC_DIR/services/$svc
          mvn clean package -B -q
          cd $CODEBUILD_SRC_DIR
        done

      # ── Python Services ────────────────────
      - echo "========================================="
      - echo "Testing Python services..."
      - echo "========================================="
      - |
        #!/bin/bash
        PYTHON_SERVICES=(
          "anomaly-detection"
          "forecasting"
          "weather-service"
          "chatbot-service"
        )
        for svc in "${PYTHON_SERVICES[@]}"; do
          echo "Testing $svc..."
          cd $CODEBUILD_SRC_DIR/services/$svc
          pip install -r requirements.txt -q
          if [ -d "tests" ]; then
            pip install pytest -q
            pytest tests/ -v --junitxml=$CODEBUILD_SRC_DIR/test-results-$svc.xml || true
          fi
          cd $CODEBUILD_SRC_DIR
        done

      # ── Frontend ───────────────────────────
      - echo "========================================="
      - echo "Building frontend..."
      - echo "========================================="
      - cd $CODEBUILD_SRC_DIR/frontend
      - npm ci
      - npm run lint || true
      - npm run build
      - cd $CODEBUILD_SRC_DIR

  post_build:
    commands:
      - echo "Build completed on $(date)"

reports:
  miyahi-test-reports:
    files:
      - "services/**/target/surefire-reports/TEST-*.xml"
      - "test-results-*.xml"
    file-format: JUNITXML

cache:
  paths:
    - "/root/.m2/**/*"
    - "/root/.npm/**/*"
    - "/root/.cache/pip/**/*"
